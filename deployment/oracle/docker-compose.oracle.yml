version: "3.9"

# GCP / Oracle Cloud deployment — single VM, all services.
# Run from repo root: docker compose -f deployment/oracle/docker-compose.oracle.yml up -d
# Requires .env with: GEMINI_API_KEY, NEO4J_PASSWORD, QDRANT_URL, NEO4J_URI, DEPLOYMENT=gemini

services:

  # ---------------------------------------------------------------------------
  # Reverse proxy — public entry point
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - dashboard
      - api
      - grafana
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Streamlit dashboard
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: ../..
      dockerfile: deployment/oracle/Dockerfile.dashboard
    env_file: ../../.env
    environment:
      - DEPLOYMENT=gemini
    ports:
      - "8501:8501"
    depends_on:
      - qdrant
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # FastAPI health + API layer
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../..
      dockerfile: deployment/oracle/Dockerfile.api
    env_file: ../../.env
    environment:
      - DEPLOYMENT=gemini
    ports:
      - "8080:8080"
    depends_on:
      - qdrant
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Vector store
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.18.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Prometheus metrics collection
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ../../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana dashboards
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Node exporter — VM-level CPU, memory, disk metrics for Grafana
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'

volumes:
  qdrant_data:
  prometheus_data:
  grafana_data:
  nginx_logs:
