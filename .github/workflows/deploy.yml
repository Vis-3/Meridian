name: Deploy to GCP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    environment: gcp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.GCP_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull and redeploy
        run: |
          ssh -i ~/.ssh/deploy_key \
              "${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }}" \
              "cd ~/meridian && \
               git pull origin main && \
               docker compose -f deployment/oracle/docker-compose.oracle.yml \
                 up -d --build --remove-orphans"

      - name: Health check
        run: |
          sleep 20
          STATUS=$(curl -sf \
            "http://${{ secrets.GCP_HOST }}/health" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['status'])")
          echo "Health status: $STATUS"
          if [ "$STATUS" != "ok" ] && [ "$STATUS" != "degraded" ]; then
            echo "Health check failed"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deploy or health check failed for commit ${{ github.sha }}"
          # Wire up Slack/email webhook here if desired
